name: couture_app
description: Application de couture d'habits culturels

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # State Management
  provider: ^6.1.1

  # HTTP & API
  http: ^1.1.2
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  flutter_tts: ^4.2.3
  image: ^4.2.0

  # Navigation
  go_router: ^13.0.0

  shared_preferences: ^2.2.3

  badges: ^3.1.2

  url_launcher: ^6.2.6

  # Web Storage
  #web: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
