version: "3.8"

services:
  backend:
    build: ./backend
    container_name: kala-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - kala-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: kala-frontend
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app
    environment:
      - API_URL=http://localhost:3000
    networks:
      - kala-network
    restart: unless-stopped

networks:
  couture-network:
    driver: bridge
