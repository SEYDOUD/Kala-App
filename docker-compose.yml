services:
  backend:
    build: ./backend
    container_name: kala-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - CV_SERVICE_URL=http://cv-service:8000
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - kala-network
    restart: unless-stopped

  cv-service:
    build: ./cv-service
    container_name: kala-cv-service
    ports:
      - "8000:8000"
    networks:
      - kala-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: kala-frontend
    ports:
      - "8080:80"
    networks:
      - kala-network
    restart: unless-stopped

  admin:
    image: node:20-alpine
    container_name: kala-admin
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    volumes:
      - ./admin:/app
      - /app/node_modules
    networks:
      - kala-network
    restart: unless-stopped

networks:
  kala-network:
    driver: bridge
