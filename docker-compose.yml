services:
  backend:
    build: ./backend
    container_name: kala-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - CV_SERVICE_URL=http://cv-service:8000
      - PAWAPAY_API_KEY=${PAWAPAY_API_KEY}
      - PAWAPAY_ENV=${PAWAPAY_ENV:-sandbox}
      - PAWAPAY_BASE_URL=${PAWAPAY_BASE_URL}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      - APP_PUBLIC_URL=${APP_PUBLIC_URL}
      - PAWAPAY_PAYMENT_FLOW=${PAWAPAY_PAYMENT_FLOW:-payment_page}
      - PAWAPAY_COUNTRY=${PAWAPAY_COUNTRY:-SEN}
      - PAWAPAY_CURRENCY=${PAWAPAY_CURRENCY:-XOF}
      - PAWAPAY_PHONE_COUNTRY_CODE=${PAWAPAY_PHONE_COUNTRY_CODE:-221}
      - PAWAPAY_LANGUAGE=${PAWAPAY_LANGUAGE:-FR}
      - PAWAPAY_RETURN_URL=${PAWAPAY_RETURN_URL}
      - PAWAPAY_CANCEL_URL=${PAWAPAY_CANCEL_URL}
      - PAWAPAY_PROVIDER=${PAWAPAY_PROVIDER}
      - PAWAPAY_PROVIDER_WAVE=${PAWAPAY_PROVIDER_WAVE}
      - PAWAPAY_PROVIDER_OM=${PAWAPAY_PROVIDER_OM}
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - kala-network
    restart: unless-stopped

  cv-service:
    build: ./cv-service
    container_name: kala-cv-service
    ports:
      - "8000:8000"
    networks:
      - kala-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://localhost:3000}
    container_name: kala-frontend
    ports:
      - "8080:80"
    networks:
      - kala-network
    restart: unless-stopped

  admin:
    image: node:20-alpine
    container_name: kala-admin
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    volumes:
      - ./admin:/app
      - /app/node_modules
    networks:
      - kala-network
    restart: unless-stopped

networks:
  kala-network:
    driver: bridge
