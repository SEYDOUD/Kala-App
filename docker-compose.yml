services:
  backend:
    build: ./backend
    container_name: kala-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - kala-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: kala-frontend
    ports:
      - "8080:80"
    networks:
      - kala-network
    restart: unless-stopped

networks:
  kala-network:
    driver: bridge
